<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">{{ site.title }}</span>
      </div>
      <div class="nav-links">
        <a href="/">首页</a>
        <a href="/about.html">关于</a>
        <a href="/blog.html">博客</a>
        <a href="/staff.html">联系</a>
      </div>
    </div>
  </nav>

  <!-- 主内容区域 -->
  <div class="container">
    <main>
      <div class="hero-section">
        <h1>{{ page.title }}</h1>
        <p class="post-date">📅 {{ page.date | date: "%Y年%m月%d日" }}</p>
        <p class="post-categories">📁 分类：{{ page.categories | join: ", " }}</p>
      </div>

      <div class="card">
        {{ content }}
      </div>

      <div class="card">
        <p><a href="/blog.html" class="btn">← 返回博客列表</a></p>
      </div>
    </main>

    <!-- 页脚 -->
    <footer>
      <p>Made with 💖 by Liya | © 2026</p>
    </footer>
  </div>
</body>
</html>
