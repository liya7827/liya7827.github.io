<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <div class="nav-container">
      <div class="nav-logo">
        <span class="logo-icon">🌸</span>
        <span class="logo-text">{{ site.title }}</span>
      </div>
      <div class="nav-links">
        <a href="/" {% if page.url == "/" %}class="active"{% endif %}>首页</a>
        <a href="/about.html" {% if page.url == "/about.html" %}class="active"{% endif %}>关于</a>
        <a href="/blog.html" {% if page.url == "/blog.html" %}class="active"{% endif %}>博客</a>
        <a href="/staff.html" {% if page.url == "/staff.html" %}class="active"{% endif %}>联系</a>
      </div>
    </div>
  </nav>

  <!-- 主内容区域 -->
  <div class="container">
    <main>
      {{ content }}
    </main>

    <!-- 页脚 -->
    <footer>
      <p>Made with 💖 by Liya | © 2026</p>
    </footer>
  </div>
</body>
</html>
